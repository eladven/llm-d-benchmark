# eval-containers / aider-polyglot kind scenario.
#
# Like eval-containers-aider-polyglot.yaml but tuned for a local kind cluster:
#   - RWO storage with kind's built-in "standard" storage class
#   - default service account (kind has no SCCs)
#   - pullPolicy: IfNotPresent (image kind-loaded locally)

scenario:
  - name: "eval-aider-polyglot"

    model:
      name: claude-sonnet-4-6
      shortName: claude-sonnet-4-6
      path: models/facebook/opt-125m
      huggingfaceId: facebook/opt-125m
      gpuMemoryUtilization: 0
      maxModelLen: 1024
      size: 2Gi

    huggingface:
      enabled: false

    affinity:
      enabled: true
      nodeSelector:
        kubernetes.io/os: linux

    accelerator:
      count: 0
      memory: 24

    images:
      vllm:
        repository: ghcr.io/llm-d/llm-d-inference-sim
        tag: latest
      benchmark:
        repository: ghcr.io/exgentic/evals/aider-polyglot--claude-code-standalone
        tag: latest
        pullPolicy: IfNotPresent

    modelservice:
      enabled: true

    standalone:
      enabled: false
      replicas: 1

      resources:
        limits:
          memory: 100Mi
          cpu: "0"
        requests:
          memory: 100Mi
          cpu: "0"

      parallelism:
        tensor: 1
        data: 1
        dataLocal: 1
        workers: 1

      accelerator:
        count: 0

      acceleratorType:
        labelKey: kubernetes.io/os
        labelValue: linux

      image:
        repository: ghcr.io/llm-d/llm-d-inference-sim
        tag: latest
        pullPolicy: IfNotPresent

      vllm:
        customCommand: "/app/llm-d-inference-sim --model /model-cache/${model.path} --port 8000 --served-model-name ${model.name}"

    inferenceExtension:
      monitoring:
        prometheus:
          enabled: false

    vllmCommon:
      shmMemory: 500Mi

      volumes:
        - name: dshm
          type: emptyDir
          emptyDir:
            medium: Memory
            sizeLimit: 500Mi

      volumeMounts:
        - name: dshm
          mountPath: /dev/shm

    prefill:
      enabled: true
      replicas: 1

      parallelism:
        tensor: 1
        data: 1
        dataLocal: 1
        workers: 1

      resources:
        limits:
          memory: 100Mi
          cpu: "0"
        requests:
          memory: 100Mi
          cpu: "0"

      accelerator:
        count: 0

      vllm:
        modelCommand: imageDefault
        additionalFlags: []

    decode:
      replicas: 1

      parallelism:
        tensor: 1
        data: 1
        dataLocal: 1
        workers: 1

      resources:
        limits:
          memory: 100Mi
          cpu: "0"
        requests:
          memory: 100Mi
          cpu: "0"

      accelerator:
        count: 0

      vllm:
        modelCommand: imageDefault
        additionalFlags: []

    storage:
      workloadPvc:
        accessModes:
          - ReadWriteOnce
        storageClassName: standard
      modelPvc:
        size: 2Gi
        accessMode:
          - ReadWriteOnce
      uriProtocol: hf

    timeouts:
      controlWait: 300

    harness:
      name: eval-containers
      experimentProfile: aider-polyglot.yaml
      entrypoint: /workspace/harnesses/eval-containers-llm-d-benchmark.sh
      pvcSize: 5Gi
      serviceAccount: default
      resources:
        cpu: "2"
        memory: 6Gi

    dataAccess:
      serviceAccount: default

    routing:
      proxy:
        enabled: false

    gateway:
      className: epponly

    infrastructure:
      gateway:
        resources:
          requests:
            cpu: "500m"
            memory: 512Mi
          limits:
            cpu: "2"
            memory: 2Gi

    workDir: "~/data/eval-aider-polyglot"
