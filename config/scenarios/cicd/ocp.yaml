# OpenShift Container Platform CI/CD Scenario
# Based on scenarios/cicd/ocp_fb.sh
#
# CI/CD scenario for OpenShift clusters.
# Uses Qwen/Qwen3-8B so the standalone baseline and FMA nightlies exercise a
# representative model whose cold start is measurable.
# GPU affinity is auto-detected (commented out in original).

scenario:
  - name: "ocp-cicd"

    # Model
    model:
      name: Qwen/Qwen3-8B
      shortName: qwen-qwen3-8b
      path: models/Qwen/Qwen3-8B
      huggingfaceId: Qwen/Qwen3-8B

    # Deployment method
    modelservice:
      enabled: true
    standalone:
      enabled: false
    fma:
      enabled: false
      iterations: 10

#    gateway:
#      className: istio

    affinity:
      enabled: true
      nodeSelector:
#        nvidia.com/gpu.product: NVIDIA-L40S
        nvidia.com/gpu.product: NVIDIA-H100-80GB-HBM3

    prefill:
      enabled: true
      replicas: 1
      acceleratorType:
        labelKey: nvidia.com/gpu.product
#        labelValue: NVIDIA-L40S
        labelValue: NVIDIA-H100-80GB-HBM3

    decode:
      enabled: true
      replicas: 1
      acceleratorType:
        labelKey: nvidia.com/gpu.product
#        labelValue: NVIDIA-L40S
        labelValue: NVIDIA-H100-80GB-HBM3

    standalone:
      acceleratorType:
        labelKey: nvidia.com/gpu.product
#        labelValue: NVIDIA-L40S
        labelValue: NVIDIA-H100-80GB-HBM3

#    storage:
#      modelPvc:
#        storageClassName: ocs-storagecluster-cephfs
#      workloadPvc:
#        storageClassName: ocs-storagecluster-cephfs

    vllmCommon:
      priorityClassName: nightly-gpu-critical

    workDir: /tmp/llmdbenchcicd-ocp/

    harness:
      name: vllm-benchmark
      experimentProfile: sanity_random.yaml
#      executable: llm-d-benchmark.py

    images:
      benchmark:
        repository: ghcr.io/llm-d/llm-d-benchmark
        tag: nightly

